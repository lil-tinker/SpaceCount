server {
    listen 443 default_server ssl;
    server_name _;
    
    ssl_certificate /etc/letsencrypt/live/spacecount.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spacecount.ru/privkey.pem;

    return 301 https://spacecount.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name spacecount.ru www.spacecount.ru;

    ssl_certificate /etc/letsencrypt/live/spacecount.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spacecount.ru/privkey.pem;

    location /django-static/ {
        alias /app/staticfiles/;
    }
    location /media/ {
        alias /app/media/;
    }
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
    location /auth/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /cameras/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        root /app/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://spacecount.ru$request_uri;
    }
}
services:

  db:
    image: postgres:16-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    env_file: .env
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn space_count.wsgi:application --bind 0.0.0.0:8000 --workers 2 --worker-class gevent --worker-connections 1000 --timeout 0"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - models_volume:/app/models
    depends_on:
      - db

  worker:
    build: ./backend
    restart: always
    env_file: .env
    command: python manage.py qcluster
    volumes:
      - media_volume:/app/media
      - models_volume:/app/models
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: "no"      
    volumes:
      - frontend_build:/app/frontend

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - frontend_build:/app/frontend
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  static_volume:
  media_volume:
  models_volume:
  frontend_build:
  certbot_certs:
